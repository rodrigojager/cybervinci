                  - generic [ref=e189]: Layout = "~/Views/Shared/_Layout.cshtml";
                  - generic [ref=e191]: "}<link href=\"~/Content/site.css\" rel=\"stylesheet\"><main class=\"cv-sample-page\"><div class=\"cv-sample-shell\"><nav class=\"cv-sample-nav\"><div class=\"cv-brand\"><span class=\"cv-brand-mark\">CV</span><span>CyberVinci Visual Editor</span></div><div class=\"cv-nav-links\"><span>Tokens Razor</span><span>Assets locais</span><span>Diff seguro</span></div></nav><section class=\"cv-hero\"><div id=\"iq97j\" class=\"cv-hero-copy\"><p class=\"cv-eyebrow\">MVP desacoplado para HTML e Razor</p><h1>Edite visualmente <span>@Model.PageTitle</span> sem quebrar Razor.</h1><p id=\"iqh3j\" class=\"cv-hero-text\">Teste</p><div class=\"cv-actions\"><a asp-controller=\"Home\" asp-action=\"Index\" class=\"cv-button primary\">Abrir no CyberVinci</a><a href=\"mailto:contato@empresa.com\" id=\"imtub\" class=\"cv-button secondary\">contato@empresa.com</a></div></div><aside class=\"cv-preview-card\"><div class=\"cv-preview-topbar\"><div class=\"cv-window-dots\"><span></span><span></span><span></span></div><strong>@ViewBag.Environment</strong></div><div class=\"cv-preview-body\"><section class=\"cv-score-panel\"><div class=\"cv-score\">96</div><div><h2>Razor protegido</h2><p>@Html.DisplayFor(m => m.SafeTokenSummary)</p></div></section><div class=\"cv-preview-grid\"><article class=\"cv-mini-card\"><span class=\"cv-metric\">@Model.TokenCount</span><h3>tokens detectados</h3><p>Inline, diretivas e blocos conservadores.</p></article><article class=\"cv-mini-card\"><span class=\"cv-metric\">@Model.AssetCount</span><h3>assets resolvidos</h3><p>CSS local carregado no canvas do editor.</p></article></div><section class=\"cv-status-row\"><div class=\"cv-status-item\"><span>Diff obrigatorio antes de salvar</span><span class=\"cv-status-pill\">ativo</span></div><div class=\"cv-status-item\"><span>Backup automatico</span><span class=\"cv-status-pill\">pronto</span></div></section></div></aside></section><section class=\"cv-feature-band\"><div class=\"cv-section-title\"><div><h2>Fluxo seguro para paginas reais</h2><p>O HTML comum continua editavel e os trechos Razor aparecem como elementos protegidos.</p></div><a asp-controller=\"Docs\" asp-action=\"RazorProtector\" class=\"cv-button secondary\">Ver detalhes</a></div><div class=\"cv-feature-grid\"><article class=\"cv-feature\"><strong>Tokenizer conservador</strong><p>Ignora e-mails, nao processa CSS @media e preserva @@ escapado.</p></article><article class=\"cv-feature\"><strong>Componentes bloqueados</strong><p>Tokens nao podem ser editados, duplicados ou removidos sem validacao.</p></article><article class=\"cv-feature\"><strong>Assets locais</strong><p>Resolve caminhos como ~/Content, /Content, /css e bundles MVC simples.</p></article></div></section>@if (Model.HasPendingReview)"
