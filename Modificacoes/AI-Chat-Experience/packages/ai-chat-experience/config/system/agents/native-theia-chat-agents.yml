version: cybervinci.catalog/v1
agents:
  - version: cybervinci.agent/v1
    kind: native
    id: OpenCoder
    sourceAgentId: OpenCoder
    defaultPlaybook: native-agent.OpenCoder
    playbooks:
      - native-agent.OpenCoder
    name: CyberVinci
    iconClass: codicon codicon-hubot
    tags:
      - Chat
      - Coding
      - Workspace
      - Provider Runtime
    description: >-
      Provider-neutral coding agent with CyberVinci AI Providers runtime, file changes, sandbox controls, and validation
      workflows.
    tools:
      - core.agent.describe
      - core.agent.preflight
      - system.agent.nativeMcpRequirements
    capabilityProfile:
      mcpPromptRefs: []
    migrationStatus:
      strategy: playbook-autonomous
      autonomousPlaybook: true
      nativeDelegate: false
      nativeDelegateFallback: false
      selectedPlaybook: native-agent.OpenCoder
      sourceAgentId: OpenCoder
      deterministicCoverage:
        - agent.describe
        - agent.preflight
        - agent.nativeMcpRequirements
        - ai.autonomousResponse
      migrationReady:
        editableUserCopy: true
        capabilityProfile: true
        replacementStillUsesNativeDelegate: false
        fallbackStillUsesNativeDelegate: false
    preserveNative:
      invoke: false
      modes: true
      prompts: true
      variables: true
      functions: true
      languageModelRequirements: true
