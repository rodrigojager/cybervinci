        transitions:
          - to: decide-native-mcp
      - id: decide-native-mcp
        type: condition
        cases:
          - if:
              equals:
                - ${input.skipNativeMcpPrompt}
                - true
            next: answer-coder
          - if:
              equals:
                - ${state.nativeMcpRequirements.recommendedAction}
                - configure
            next: ask-native-mcp-configure
          - if:
              equals:
                - ${state.nativeMcpRequirements.recommendedAction}
                - start
            next: ask-native-mcp-start
        default: answer-coder
      - id: ask-native-mcp-configure
        type: ask
        label: Configure MCP requirement
        text: >-
          ${state.nativeMcpRequirements.selectedGroupLabel} is not ready for ${state.nativeMcpRequirements.agentName}.
          Choose how to continue.
        saveAs: nativeMcpDecision
        options:
          - id: configure-settings
            label: Configure MCP settings
            next: configure-native-mcp
          - id: cancel
            label: Cancel
            next: cancel-native-mcp
      - id: ask-native-mcp-start
        type: ask
        label: Start MCP requirement
        text: >-
          ${state.nativeMcpRequirements.selectedGroupLabel} is configured but not running for
          ${state.nativeMcpRequirements.agentName}. Choose how to continue.
        saveAs: nativeMcpDecision
        options:
          - id: start-through-playbook
            label: Start MCP servers
            next: ensure-native-mcp
          - id: cancel
            label: Cancel
            next: cancel-native-mcp
      - id: configure-native-mcp
        type: tool
        tool: system.agent.nativeMcpRequirements
        args:
          mode: configure
          openSettings: true
        saveAs: nativeMcpSetup
        transitions:
          - to: native-mcp-configured-response
      - id: ensure-native-mcp
        type: tool
        tool: system.agent.nativeMcpRequirements
        args:
          mode: ensure
        saveAs: nativeMcpSetup
        transitions:
          - to: answer-coder
            when:
              equals:
                - ${state.nativeMcpSetup.ok}
                - true
          - to: native-mcp-start-failed
      - id: native-mcp-configured-response
        type: response
        text: >-
          MCP settings were opened for ${state.nativeMcpRequirements.selectedGroupLabel}. Save the required values and
          run the agent again.
      - id: native-mcp-start-failed
        type: response
        text: 'Could not start ${state.nativeMcpRequirements.selectedGroupLabel}: ${state.nativeMcpSetup.message}'
      - id: cancel-native-mcp
        type: response
        text: ${state.nativeMcpRequirements.selectedGroupLabel} setup was cancelled.
      - id: answer-coder
        type: ai
        agent: Coder
        prompt: >
          You are the CyberVinci Coder agent. Produce focused implementation guidance for the user's
          software-development request, including likely files, minimal code changes, edge cases, and validation
          commands.


          User request:

          ${input.prompt}


          Selected agent:

          ${state.agentProfile.agent.name}


          Agent description:

          ${state.agentProfile.agent.description}


          Keep the answer actionable and scoped. Do not claim that repository files were inspected or tests were run
          unless the current state contains that evidence. When more context is needed, name the exact files, symbols,
          or tests to inspect next.
        input:
          prompt: ${input.prompt}
          agentId: ${input.agentId}
          sourceAgentId: ${input.sourceAgentId}
          agentProfile: ${state.agentProfile}
          preflight: ${state.agentPreflight}
          nativeMcpRequirements: ${state.nativeMcpRequirements}
        saveAs: coderAnswer
        transitions:
          - to: coder-response
      - id: coder-response
        type: response
        text: ${state.coderAnswer}
      - id: end
        type: end
