version: cybervinci.catalog/v1
playbooks:
  - version: cybervinci.playbook/v1
    id: native-agent.OpenCoder
    name: CyberVinci
    category: Agents
    source: system
    enabled: true
    description: >-
      Use CyberVinci for broad workspace tasks that need implementation guidance, file-change planning, provider-aware
      execution choices, and validation steps.
    entry: describe-agent
    tools:
      - core.agent.describe
      - core.agent.preflight
      - system.agent.nativeMcpRequirements
    tags:
      - Agents
      - Autonomous
      - CyberVinci
    states:
      - id: describe-agent
        type: tool
        tool: core.agent.describe
        saveAs: agentProfile
        transitions:
          - to: preflight
      - id: preflight
        type: tool
        tool: core.agent.preflight
        saveAs: agentPreflight
        transitions:
          - to: check-native-requirements
      - id: check-native-requirements
        type: tool
        tool: system.agent.nativeMcpRequirements
        saveAs: nativeMcpRequirements
        transitions:
          - to: decide-native-mcp
      - id: decide-native-mcp
        type: condition
        cases:
          - if:
              equals:
                - ${input.skipNativeMcpPrompt}
                - true
            next: answer-open-coder
          - if:
              equals:
                - ${state.nativeMcpRequirements.recommendedAction}
                - configure
            next: ask-native-mcp-configure
          - if:
              equals:
                - ${state.nativeMcpRequirements.recommendedAction}
                - start
            next: ask-native-mcp-start
        default: answer-open-coder
      - id: ask-native-mcp-configure
        type: ask
        label: Configure MCP requirement
        text: >-
          ${state.nativeMcpRequirements.selectedGroupLabel} is not ready for ${state.nativeMcpRequirements.agentName}.
          Choose how to continue.
        saveAs: nativeMcpDecision
        options:
          - id: configure-settings
            label: Configure MCP settings
            next: configure-native-mcp
          - id: cancel
            label: Cancel
            next: cancel-native-mcp
      - id: ask-native-mcp-start
        type: ask
        label: Start MCP requirement
        text: >-
          ${state.nativeMcpRequirements.selectedGroupLabel} is configured but not running for
          ${state.nativeMcpRequirements.agentName}. Choose how to continue.
        saveAs: nativeMcpDecision
        options:
          - id: start-through-playbook
            label: Start MCP servers
            next: ensure-native-mcp
          - id: cancel
            label: Cancel
            next: cancel-native-mcp
      - id: configure-native-mcp
        type: tool
        tool: system.agent.nativeMcpRequirements
        args:
          mode: configure
          openSettings: true
        saveAs: nativeMcpSetup
        transitions:
          - to: native-mcp-configured-response
      - id: ensure-native-mcp
        type: tool
        tool: system.agent.nativeMcpRequirements
        args:
          mode: ensure
        saveAs: nativeMcpSetup
        transitions:
          - to: answer-open-coder
            when:
              equals:
                - ${state.nativeMcpSetup.ok}
                - true
          - to: native-mcp-start-failed
      - id: native-mcp-configured-response
        type: response
        text: >-
          MCP settings were opened for ${state.nativeMcpRequirements.selectedGroupLabel}. Save the required values and
          run the agent again.
      - id: native-mcp-start-failed
        type: response
        text: 'Could not start ${state.nativeMcpRequirements.selectedGroupLabel}: ${state.nativeMcpSetup.message}'
      - id: cancel-native-mcp
        type: response
        text: ${state.nativeMcpRequirements.selectedGroupLabel} setup was cancelled.
      - id: answer-open-coder
        type: ai
        agent: OpenCoder
        prompt: >
          You are the CyberVinci provider-neutral coding agent. Answer the user's request with workspace-aware
          implementation guidance, safe file-change planning, validation steps, and provider/runtime awareness.


          User request:

          ${input.prompt}


          Selected agent:

          ${state.agentProfile.agent.name}


          Agent description:

          ${state.agentProfile.agent.description}


          Prefer concrete next actions and narrow changes. Do not claim you inspected files, edited code, or ran
          commands unless that evidence is present in the current state. If execution is required, state the exact
          checks or edits the caller should perform next.
        input:
          prompt: ${input.prompt}
          agentId: ${input.agentId}
          sourceAgentId: ${input.sourceAgentId}
          agentProfile: ${state.agentProfile}
          preflight: ${state.agentPreflight}
          nativeMcpRequirements: ${state.nativeMcpRequirements}
        saveAs: openCoderAnswer
        transitions:
          - to: open-coder-response
      - id: open-coder-response
        type: response
        text: ${state.openCoderAnswer}
      - id: end
        type: end
  - version: cybervinci.playbook/v1
